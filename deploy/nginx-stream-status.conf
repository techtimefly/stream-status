server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/stream-status;
    index index.html;

    # Static files — SPA fallback to index.html so client-side routes
    # like /p/<id>/plan, /p/<id>/live, /p/<id>/setup don't 404 on direct nav
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OBS WebSocket proxy (HTTPS pages can't connect to plain ws://)
    # Replace STREAMING_PC_IP with your streaming PC's local IP address
    location /obs-ws {
        proxy_pass http://STREAMING_PC_IP:4455;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
